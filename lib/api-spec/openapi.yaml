openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Travel Car Booking API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: cars
    description: Car travel listings
  - name: bookings
    description: Booking operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cars:
    get:
      operationId: listCars
      tags: [cars]
      summary: List all available cars
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: destination
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of cars
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Car"

  /cars/{id}:
    get:
      operationId: getCar
      tags: [cars]
      summary: Get a car by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Car details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Car"
        "404":
          description: Car not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /cars/featured:
    get:
      operationId: getFeaturedCars
      tags: [cars]
      summary: Get featured/popular cars
      responses:
        "200":
          description: Featured cars
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Car"

  /bookings:
    get:
      operationId: listBookings
      tags: [bookings]
      summary: List bookings for the current user
      responses:
        "200":
          description: List of bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Create a new booking (call request)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingRequest"
      responses:
        "201":
          description: Booking created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}:
    get:
      operationId: getBooking
      tags: [bookings]
      summary: Get a booking by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Booking details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats/summary:
    get:
      operationId: getStatsSummary
      tags: [bookings]
      summary: Get booking and travel stats summary
      responses:
        "200":
          description: Stats summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatsSummary"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        phone:
          type: string
      required: [name, email, password]

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required: [email, password]

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string
      required: [user, token]

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, name, email]

    Car:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          description: "SUV, Sedan, Luxury, Van, etc."
        description:
          type: string
        capacity:
          type: integer
        pricePerDay:
          type: number
        destination:
          type: string
        imageUrl:
          type: string
        rating:
          type: number
        reviewCount:
          type: integer
        features:
          type: array
          items:
            type: string
        available:
          type: boolean
        featured:
          type: boolean
      required: [id, name, type, pricePerDay, available]

    CreateBookingRequest:
      type: object
      properties:
        carId:
          type: integer
        customerName:
          type: string
        customerPhone:
          type: string
        customerEmail:
          type: string
        pickupDate:
          type: string
          format: date
        returnDate:
          type: string
          format: date
        pickupLocation:
          type: string
        destination:
          type: string
        notes:
          type: string
      required: [carId, customerName, customerPhone, customerEmail, pickupDate, pickupLocation]

    Booking:
      type: object
      properties:
        id:
          type: integer
        carId:
          type: integer
        car:
          $ref: "#/components/schemas/Car"
        customerName:
          type: string
        customerPhone:
          type: string
        customerEmail:
          type: string
        pickupDate:
          type: string
        returnDate:
          type: string
        pickupLocation:
          type: string
        destination:
          type: string
        notes:
          type: string
        status:
          type: string
          description: "pending, confirmed, completed, cancelled"
        totalPrice:
          type: number
        createdAt:
          type: string
          format: date-time
      required: [id, carId, customerName, customerPhone, customerEmail, pickupDate, pickupLocation, status]

    StatsSummary:
      type: object
      properties:
        totalCars:
          type: integer
        availableCars:
          type: integer
        totalBookings:
          type: integer
        pendingBookings:
          type: integer
        popularDestinations:
          type: array
          items:
            type: object
            properties:
              destination:
                type: string
              count:
                type: integer
            required: [destination, count]
      required: [totalCars, availableCars, totalBookings, pendingBookings, popularDestinations]
